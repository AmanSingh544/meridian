<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Meridian — Loading</title>
  <desc>
    Animated compass-rose loader for the Meridian platform.
  </desc>
  <style>
    @import url(&apos;https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap&apos;);

    @keyframes pIn { 0%{opacity:0;transform:scale(0.2)} 60%{transform:scale(1.1)} 100%{opacity:1;transform:scale(1)} }
    @keyframes pPulse { 0%,100%{opacity:0.85} 50%{opacity:1} }
    @keyframes cPop { 0%{r:0;opacity:0} 50%{r:5.5;opacity:1} 100%{r:4;opacity:1} }
    @keyframes ringPulse { 0%{r:4;opacity:0;stroke-width:2} 60%{opacity:0.4} 100%{r:14;opacity:0;stroke-width:0.3} }
    @keyframes ltReveal { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes lineGrow { 0%{stroke-dashoffset:120} 100%{stroke-dashoffset:0} }
    @keyframes slowSpin { to{transform:rotate(360deg)} }
    @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }

    .m-pn{animation:pIn .5s ease forwards,pPulse 2.8s ease-in-out 2s infinite;opacity:0;transform-origin:340px 120px}
    .m-pe{animation:pIn .5s .13s ease forwards,pPulse 2.8s ease-in-out 2.15s infinite;opacity:0;transform-origin:340px 120px}
    .m-ps{animation:pIn .5s .26s ease forwards,pPulse 2.8s ease-in-out 2.3s infinite;opacity:0;transform-origin:340px 120px}
    .m-pw{animation:pIn .5s .39s ease forwards,pPulse 2.8s ease-in-out 2.45s infinite;opacity:0;transform-origin:340px 120px}
    .m-dg{animation:pIn .35s .55s ease forwards;opacity:0;transform-origin:340px 120px}
    .m-cd{animation:cPop .4s .7s ease forwards;opacity:0}
    .m-cr{animation:ringPulse 1.4s .9s ease-out infinite;opacity:0}
    .m-spin{animation:slowSpin 24s linear infinite;transform-origin:340px 120px}

    .m-wm{font-family:&apos;Space Grotesk&apos;,sans-serif;font-weight:600;font-size:48px;letter-spacing:-0.5px}
    .m-tag{font-family:&apos;Space Grotesk&apos;,sans-serif;font-weight:400;font-size:12.5px;letter-spacing:4px;text-transform:uppercase}

    .ml1{animation:ltReveal 3.3s .75s ease forwards;opacity:0}
    .ml2{animation:ltReveal .3s .83s ease forwards;opacity:0}
    .ml3{animation:ltReveal 3.3s .91s ease forwards;opacity:0}
    .ml4{animation:ltReveal .3s .99s ease forwards;opacity:0}
    .ml5{animation:ltReveal 3.3s 1.07s ease forwards;opacity:0}
    .ml6{animation:ltReveal .3s 1.15s ease forwards;opacity:0}
    .ml7{animation:ltReveal 3.3s 1.23s ease forwards;opacity:0}
    .ml8{animation:ltReveal .3s 1.31s ease forwards;opacity:0}

    .m-div{stroke-dasharray:120;animation:lineGrow .6s 1.4s ease forwards;stroke-dashoffset:120}
    .m-tg{animation:fadeIn .5s 1.7s ease forwards;opacity:0}

    /* Light theme */
    .m-wm{fill:#0f172a}
    .m-tag{fill:#64748b}

    /* Dark theme */
    @media(prefers-color-scheme:dark){
      .m-wm{fill:#f1f5f9}
      .m-tag{fill:#94a3b8}
      .m-pn{fill:#818cf8!important}
      .m-pe{fill:#a5b4fc!important}
      .m-ps{fill:#c7d2fe!important}
      .m-pw{fill:#e0e7ff!important}
      .m-dg-ne{fill:#818cf8!important}
      .m-dg-se{fill:#a5b4fc!important}
      .m-dg-sw{fill:#c7d2fe!important}
      .m-dg-nw{fill:#e0e7ff!important}
      .m-cd{fill:#818cf8!important}
      .m-cr{stroke:#a5b4fc!important}
      .m-div-line{stroke:#a5b4fc!important}
    }
  </style>
  <g class="m-spin">
<!--North petal-->
    <path class="m-pn" d="M 340 68 L 354 106 L 340 114 L 326 106 Z" fill="#4f46e5" opacity="0.95"/>
<!--East petal-->
    <path class="m-pe" d="M 392 120 L 354 134 L 346 120 L 354 106 Z" fill="#6366f1" opacity="0.85"/>
<!--South petal-->
    <path class="m-ps" d="M 340 172 L 326 134 L 340 126 L 354 134 Z" fill="#818cf8" opacity="0.75"/>
<!--West petal-->
    <path class="m-pw" d="M 288 120 L 326 106 L 334 120 L 326 134 Z" fill="#a5b4fc" opacity="0.65"/>
<!--Diagonal accents-->
    <path class="m-dg m-dg-ne" d="M 372 88 L 352 112 L 348 108 Z" fill="#4f46e5" opacity="0.3"/>
    <path class="m-dg m-dg-se" d="M 372 152 L 348 132 L 352 128 Z" fill="#6366f1" opacity="0.25"/>
    <path class="m-dg m-dg-sw" d="M 308 152 L 328 128 L 332 132 Z" fill="#818cf8" opacity="0.2"/>
    <path class="m-dg m-dg-nw" d="M 308 88 L 332 108 L 328 112 Z" fill="#a5b4fc" opacity="0.2"/>
<!--Center dot-->
    <circle class="m-cd" cx="340" cy="120" r="4" fill="#4f46e5"/>
    <circle class="m-cr" cx="340" cy="120" r="4" fill="none" stroke="#4f46e5" stroke-width="1"/>
  </g>
<!--Wordmark-->
  <text text-anchor="middle" y="228" class="m-wm">
    <tspan class="ml1" x="340" dx="">M</tspan><tspan class="ml2">E</tspan><tspan class="ml3">R</tspan><tspan class="ml4">I</tspan><tspan class="ml5">D</tspan><tspan class="ml6">I</tspan><tspan class="ml7">A</tspan><tspan class="ml8">N</tspan>
  </text>
<!--Divider line-->
  <line class="m-div m-div-line" x1="280" y1="243" x2="400" y2="243" stroke="#4f46e5" stroke-width="1.5" opacity="0.35"/>
<!--Tagline-->
  <text x="340" y="264" text-anchor="middle" class="m-tag m-tg">Intelligent Support</text>
</svg>
