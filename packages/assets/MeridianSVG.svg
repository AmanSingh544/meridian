<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Meridian logo — compass rose</title>
  <desc>An abstract compass-rose mark with layered angular petals converging to a center point, paired with the Meridian wordmark.</desc>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap');
    .wm { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 48px; letter-spacing: -0.5px; }
    .tag { font-family: 'Space Grotesk', sans-serif; font-weight: 400; font-size: 12.5px; letter-spacing: 4px; text-transform: uppercase; }
    @media (prefers-color-scheme: light) {
      .wm { fill: #0f172a; }
      .tag { fill: #64748b; }
    }
    @media (prefers-color-scheme: dark) {
      .wm { fill: #f1f5f9; }
      .tag { fill: #94a3b8; }
    }
  </style>

  <g transform="translate(340, 120)">
    <!-- North petal -->
    <path d="M 0 -52 L 14 -14 L 0 -6 L -14 -14 Z" fill="#4f46e5" opacity="0.95"/>
    <!-- East petal -->
    <path d="M 52 0 L 14 14 L 6 0 L 14 -14 Z" fill="#6366f1" opacity="0.85"/>
    <!-- South petal -->
    <path d="M 0 52 L -14 14 L 0 6 L 14 14 Z" fill="#818cf8" opacity="0.75"/>
    <!-- West petal -->
    <path d="M -52 0 L -14 -14 L -6 0 L -14 14 Z" fill="#a5b4fc" opacity="0.65"/>

    <!-- Diagonal accents -->
    <path d="M 32 -32 L 12 -8 L 8 -12 Z" fill="#4f46e5" opacity="0.3"/>
    <path d="M 32 32 L 8 12 L 12 8 Z" fill="#6366f1" opacity="0.25"/>
    <path d="M -32 32 L -12 8 L -8 12 Z" fill="#818cf8" opacity="0.2"/>
    <path d="M -32 -32 L -8 -12 L -12 -8 Z" fill="#a5b4fc" opacity="0.2"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#4f46e5"/>
    <circle cx="0" cy="0" r="7.5" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="228" text-anchor="middle" class="wm">MERIDIAN</text>

  <!-- Divider line -->
  <line x1="280" y1="243" x2="400" y2="243" stroke="#4f46e5" stroke-width="1.5" opacity="0.35"/>

  <!-- Tagline -->
  <text x="340" y="264" text-anchor="middle" class="tag">Intelligent Support</text>
</svg>
